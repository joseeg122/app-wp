<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Flappy Bird - Juego</title>
    <link rel="stylesheet" href="flappy.css" />
  </head>
  <body>
    <div id="game-area">
      <div id="score">Puntuacion: 0</div>
      <div id="bestScore">Mejor Puntuacion: 0</div>
      <canvas id="gameCanvas"></canvas>
      <div id="recordToast" class="toast">¡Nuevo récord! 🎉</div>
      <div id="startOverlay">
        <div id="gameTitleStart" class="game-title"> FLAPPY BIRD </div>
        <div id="bestScoreStart" class="best-score-display">Mejor Puntuación: 0</div>
        <div class="start-message">Presiona Iniciar para comenzar</div>
        <button id="startBtn" class="start-button">Iniciar Juego</button>
      </div>
      <div id="gameOver">
        <p id="gameOverTitle">¡Juego Terminado!</p>
        <div id="gameOverScores">
          <p id="currentScoreDisplay">Tu Puntuación: 0</p>
          <p id="bestScoreGameOver">Mejor Puntuación: 0</p>
        </div>
        <p>Haz clic para reiniciar</p>
        <button id="restartBtn">Reiniciar</button>
      </div>
    </div>
    <audio id="bgMusic" src="bg.mp3" preload="auto" loop></audio>
    <audio id="dieSound" src="dead.mp3" preload="auto"></audio>
    <script type="module" src="scripts/game.js"></script>
</body>
</html>
